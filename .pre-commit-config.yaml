repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml

  - repo: local
    hooks:
      - id: validate-registry
        name: Validate registry TOML files
        entry: python3 scripts/validate.py
        language: system
        pass_filenames: false
        always_run: true
