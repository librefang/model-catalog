id = "strategist"
name = "Strategist Hand"
description = "Autonomous strategy analyst — market research, competitive analysis, business planning, and strategic recommendations"
category = "productivity"
icon = "🎯"

tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

[routing]
aliases = [
  "strategic analysis",
  "competitive analysis",
  "business plan",
  "market research",
]
weak_aliases = ["swot", "industry report", "competitive landscape"]

